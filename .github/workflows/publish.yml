name: publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ghcr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5.0.0
      - uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@a09bb95b73a5a16c3d96f60a8a2d4faf06f8c2c8 # v6.11.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gha-shield-mcp:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/gha-shield-mcp:latest
